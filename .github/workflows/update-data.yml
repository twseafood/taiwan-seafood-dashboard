name: 更新漁產品交易行情資料

on:
  schedule:
    # 每天台北時間 07:10 執行（UTC 23:10 為前一天）；GitHub Actions機房IP常被data.moa.gov.tw
    # 擋下，這個排程多半只是備援，主要靠下面的 push 觸發（見cloudflare-worker/README.md）
    - cron: "10 23 * * *"
  push:
    # Cloudflare Worker把抓到的原始資料寫進 data/raw/ 後會觸發這裡，馬上整理成docs/data並發佈，
    # 不用等到隔天排程時間，資料延遲從「最多一天」縮短到「幾分鐘」
    paths:
      - "data/raw/**"
  workflow_dispatch:
    inputs:
      days:
        description: "要抓最近幾天的資料（含今天，GitHub Actions自行嘗試抓取用；通常會被擋下失敗，屬預期行為）"
        default: "5"
        required: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 嘗試自行抓取最近資料（機房IP常被擋，失敗屬預期行為，不影響後續步驟）
        id: fetch
        continue-on-error: true
        run: |
          mkdir -p /tmp/incoming
          python scripts/fetch_aquatic_data.py \
            --days "${{ github.event.inputs.days || '5' }}" \
            --top 5000 \
            -o /tmp/incoming/latest.json

      - name: 整理資料到 docs/data
        # 不論上面自行抓取是否成功都要跑：即使這次自己抓不到，data/raw/ 目錄裡
        # 也可能已經有 Cloudflare Worker 剛寫進來的新資料（見 cloudflare-worker/README.md），
        # 這一步純粹是本機檔案運算，不需要連到data.moa.gov.tw，不會被擋。
        run: |
          if [ "${{ steps.fetch.outcome }}" = "success" ]; then
            python scripts/process_data.py --extra /tmp/incoming/latest.json
          else
            echo "::warning::GitHub Actions自行抓取失敗（預期中，機房IP常被data.moa.gov.tw擋下）。改用 data/raw/ 目錄現有的資料處理。"
            python scripts/process_data.py
          fi

      - name: 檢查是否有變更
        id: git-check
        run: |
          git add docs/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit 並 push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: 自動更新漁產品交易行情資料 $(date -u +%Y-%m-%d)"
          git push
