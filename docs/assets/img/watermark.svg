<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <!-- Q版海洋浮水印圖樣 v2：參考 hsuchihting 的可愛海洋風格（大眼睛、腮紅、圓潤造型），
       漁船、漁工勾肩搭背、可愛魚與小卷，低透明度平鋪用 -->
  <g opacity="0.13">

    <!-- ===== 元素1：Ｑ版漁船（左上）===== -->
    <g transform="translate(38,42)">
      <path d="M0,42 Q4,60 28,60 L76,60 Q100,60 104,42 Z" fill="#4fa5c9" stroke="#0b3d5c" stroke-width="3" stroke-linejoin="round"/>
      <rect x="26" y="14" width="30" height="26" rx="6" fill="#ffffff" stroke="#0b3d5c" stroke-width="3"/>
      <circle cx="41" cy="27" r="5" fill="#4fa5c9" stroke="#0b3d5c" stroke-width="2"/>
      <line x1="70" y1="42" x2="70" y2="2" stroke="#0b3d5c" stroke-width="3" stroke-linecap="round"/>
      <path d="M70,2 L90,9 L70,16 Z" fill="#e2725b" stroke="#0b3d5c" stroke-width="2" stroke-linejoin="round"/>
      <!-- 船頭笑臉 -->
      <circle cx="94" cy="46" r="2.2" fill="#0b3d5c"/>
      <path d="M89,52 q5,4 10,0" fill="none" stroke="#0b3d5c" stroke-width="2" stroke-linecap="round"/>
      <ellipse cx="97" cy="50" rx="3" ry="2" fill="#f2a9a0" opacity="0.8"/>
      <path d="M-14,66 q10,-9 20,0 q10,-9 20,0 q10,-9 20,0 q10,-9 20,0 q10,-9 20,0 q10,-9 20,0" fill="none" stroke="#0b3d5c" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- ===== 元素2：漁工勾肩搭背（右上）＝台灣漁工＋外籍漁工，好朋友站一起 ===== -->
    <g transform="translate(250,20)">
      <!-- 左邊：台灣漁工，戴斗笠 -->
      <g transform="translate(0,0)">
        <path d="M-4,26 Q28,-8 60,26 Z" fill="#0b3d5c" stroke="#0b3d5c" stroke-width="3" stroke-linejoin="round"/>
        <ellipse cx="28" cy="26" rx="32" ry="5" fill="#0b3d5c"/>
        <circle cx="28" cy="42" r="15" fill="#ffffff" stroke="#0b3d5c" stroke-width="3"/>
        <circle cx="22" cy="41" r="2.3" fill="#0b3d5c"/>
        <circle cx="34" cy="41" r="2.3" fill="#0b3d5c"/>
        <circle cx="23" cy="40" r="0.8" fill="#ffffff"/>
        <circle cx="35" cy="40" r="0.8" fill="#ffffff"/>
        <path d="M21,48 q7,5 14,0" fill="none" stroke="#0b3d5c" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="17" cy="47" rx="3.4" ry="2.2" fill="#f2a9a0" opacity="0.85"/>
        <ellipse cx="39" cy="47" rx="3.4" ry="2.2" fill="#f2a9a0" opacity="0.85"/>
        <path d="M10,58 Q28,50 46,58 L50,96 Q28,106 6,96 Z" fill="#4fa5c9" stroke="#0b3d5c" stroke-width="3" stroke-linejoin="round"/>
      </g>
      <!-- 右邊：外籍漁工，戴頭巾 -->
      <g transform="translate(46,0)">
        <circle cx="28" cy="42" r="15" fill="#ffffff" stroke="#0b3d5c" stroke-width="3"/>
        <path d="M12,34 Q28,16 44,34 Q44,24 28,22 Q12,24 12,34 Z" fill="#e2725b" stroke="#0b3d5c" stroke-width="3" stroke-linejoin="round"/>
        <path d="M42,32 q11,5 6,18" fill="none" stroke="#0b3d5c" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="22" cy="41" r="2.3" fill="#0b3d5c"/>
        <circle cx="34" cy="41" r="2.3" fill="#0b3d5c"/>
        <circle cx="23" cy="40" r="0.8" fill="#ffffff"/>
        <circle cx="35" cy="40" r="0.8" fill="#ffffff"/>
        <path d="M21,48 q7,5 14,0" fill="none" stroke="#0b3d5c" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="17" cy="47" rx="3.4" ry="2.2" fill="#f2a9a0" opacity="0.85"/>
        <ellipse cx="39" cy="47" rx="3.4" ry="2.2" fill="#f2a9a0" opacity="0.85"/>
        <path d="M10,58 Q28,50 46,58 L50,96 Q28,106 6,96 Z" fill="#ffd166" stroke="#0b3d5c" stroke-width="3" stroke-linejoin="round"/>
        <path d="M8,72 L48,72 M6,82 L50,82" stroke="#0b3d5c" stroke-width="1.6" stroke-dasharray="3,5"/>
      </g>
      <!-- 勾肩：兩人中間交疊的手臂 -->
      <path d="M46,64 Q57,58 68,64" fill="none" stroke="#0b3d5c" stroke-width="4" stroke-linecap="round"/>
      <path d="M28,70 Q40,62 52,70" fill="none" stroke="#0b3d5c" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- ===== 元素3：Ｑ版可愛魚（左中）＝大眼睛＋腮紅 ===== -->
    <g transform="translate(70,200)">
      <path d="M0,16 Q22,-8 54,16 Q22,40 0,16 Z" fill="#4fa5c9" stroke="#0b3d5c" stroke-width="3" stroke-linejoin="round"/>
      <path d="M0,16 L-18,2 L-18,30 Z" fill="#4fa5c9" stroke="#0b3d5c" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="38" cy="10" r="4" fill="#0b3d5c"/>
      <circle cx="39.3" cy="8.7" r="1.2" fill="#ffffff"/>
      <ellipse cx="30" cy="18" rx="4" ry="2.5" fill="#f2a9a0" opacity="0.85"/>
      <path d="M18,3 Q26,-6 34,2" fill="none" stroke="#0b3d5c" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- ===== 元素4：Ｑ版小卷（呼應參考網站的粉色小卷）===== -->
    <g transform="translate(330,260)">
      <ellipse cx="24" cy="20" rx="24" ry="22" fill="#f2b9c4" stroke="#0b3d5c" stroke-width="3"/>
      <circle cx="16" cy="16" r="4.2" fill="#0b3d5c"/>
      <circle cx="32" cy="16" r="4.2" fill="#0b3d5c"/>
      <circle cx="17.5" cy="14.5" r="1.3" fill="#ffffff"/>
      <circle cx="33.5" cy="14.5" r="1.3" fill="#ffffff"/>
      <ellipse cx="10" cy="24" rx="3.6" ry="2.4" fill="#e2725b" opacity="0.8"/>
      <ellipse cx="38" cy="24" rx="3.6" ry="2.4" fill="#e2725b" opacity="0.8"/>
      <path d="M16,26 q8,6 16,0" fill="none" stroke="#0b3d5c" stroke-width="2" stroke-linecap="round"/>
      <path d="M6,40 q-4,14 2,24 M14,42 q-2,16 4,26 M24,43 q0,17 0,28 M34,42 q2,16 -4,26 M42,40 q4,14 -2,24"
            fill="none" stroke="#0b3d5c" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- ===== 元素5：浪花線條（右下）===== -->
    <g transform="translate(300,340)" stroke="#0b3d5c" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M-40,20 q10,-10 20,0 q10,-10 20,0 q10,-10 20,0 q10,-10 20,0 q10,-10 20,0"/>
      <path d="M-40,34 q10,-10 20,0 q10,-10 20,0 q10,-10 20,0 q10,-10 20,0 q10,-10 20,0" opacity="0.6"/>
    </g>

    <!-- ===== 元素6：第二艘小漁船（左下）===== -->
    <g transform="translate(24,340) scale(0.72)">
      <path d="M0,42 Q4,60 28,60 L76,60 Q100,60 104,42 Z" fill="#ffd166" stroke="#0b3d5c" stroke-width="3.5" stroke-linejoin="round"/>
      <rect x="26" y="14" width="30" height="26" rx="6" fill="#ffffff" stroke="#0b3d5c" stroke-width="3.5"/>
      <line x1="70" y1="42" x2="70" y2="2" stroke="#0b3d5c" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M70,2 L90,9 L70,16 Z" fill="#4fa5c9" stroke="#0b3d5c" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

  </g>
</svg>
